name: Generate My GitHub Stats

on:
  workflow_dispatch:

  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          python3 <<'PY'

          import os
          import json
          import urllib.request
          import datetime
          from collections import Counter

          USERNAME = "Amzad-Hussain-786"
          TOKEN = os.environ["GITHUB_TOKEN"]

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "Amzad-GitHub-Stats"
          }

          def api_get(url):

              request = urllib.request.Request(
                  url,
                  headers=HEADERS
              )

              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read())

          # --------------------------------
          # USER DATA
          # --------------------------------

          user = api_get(
              f"https://api.github.com/users/{USERNAME}"
          )

          followers = user.get("followers", 0)
          public_repos = user.get("public_repos", 0)

          # --------------------------------
          # REPOSITORIES
          # --------------------------------

          repositories = []

          for page in range(1, 10):

              url = (
                  f"https://api.github.com/users/{USERNAME}/repos"
                  f"?per_page=100&page={page}&type=owner"
              )

              data = api_get(url)

              if not data:
                  break

              repositories.extend(data)

              if len(data) < 100:
                  break

          # --------------------------------
          # STARS AND FORKS
          # --------------------------------

          total_stars = sum(
              repo.get("stargazers_count", 0)
              for repo in repositories
          )

          total_forks = sum(
              repo.get("forks_count", 0)
              for repo in repositories
          )

          # --------------------------------
          # LANGUAGES
          # --------------------------------

          languages = Counter()

          for repo in repositories:

              if repo.get("fork"):
                  continue

              try:

                  language_data = api_get(
                      repo["languages_url"]
                  )

                  for language, value in language_data.items():

                      languages[language] += value

              except Exception:

                  pass

          top_languages = languages.most_common(5)

          if top_languages:

              languages_text = " • ".join(
                  language
                  for language, value in top_languages
              )

          else:

              languages_text = "JavaScript • HTML • CSS"

          # --------------------------------
          # CONTRIBUTIONS
          # --------------------------------

          end_date = datetime.datetime.utcnow()

          start_date = (
              end_date -
              datetime.timedelta(days=365)
          )

          query = """

          query($user: String!, $from: DateTime!, $to: DateTime!) {

            user(login: $user) {

              contributionsCollection(
                from: $from
                to: $to
              ) {

                contributionCalendar {

                  totalContributions

                  weeks {

                    contributionDays {

                      contributionCount

                      date

                    }

                  }

                }

              }

            }

          }

          """

          payload = json.dumps({

              "query": query,

              "variables": {

                  "user": USERNAME,

                  "from": start_date.isoformat() + "Z",

                  "to": end_date.isoformat() + "Z"

              }

          }).encode("utf-8")

          request = urllib.request.Request(

              "https://api.github.com/graphql",

              data=payload,

              headers={

                  **HEADERS,

                  "Content-Type":
                  "application/json"

              },

              method="POST"

          )

          with urllib.request.urlopen(request) as response:

              graphql_data = json.loads(
                  response.read()
              )

          calendar = (

              graphql_data
              .get("data", {})
              .get("user", {})
              .get("contributionsCollection", {})
              .get("contributionCalendar", {})
          )

          contributions = calendar.get(
              "totalContributions",
              0
          )

          # --------------------------------
          # CURRENT STREAK
          # --------------------------------

          contribution_days = []

          for week in calendar.get("weeks", []):

              for day in week.get(
                  "contributionDays",
                  []
              ):

                  if day["contributionCount"] > 0:

                      contribution_days.append(
                          day["date"]
                      )

          contribution_days.sort()

          current_streak = 0

          today = datetime.date.today()

          date_cursor = today

          while date_cursor.isoformat() in contribution_days:

              current_streak += 1

              date_cursor -= datetime.timedelta(
                  days=1
              )

          # --------------------------------
          # CREATE FOLDER
          # --------------------------------

          os.makedirs(
              "stats",
              exist_ok=True
          )

          # --------------------------------
          # MAIN STATS CARD
          # --------------------------------

          current_time = datetime.datetime.utcnow().strftime(
              "%Y-%m-%d %H:%M UTC"
          )

          stats_svg = f'''

          <svg
            width="1000"
            height="520"
            viewBox="0 0 1000 520"
            xmlns="http://www.w3.org/2000/svg">

            <defs>

              <linearGradient
                id="bg"
                x1="0%"
                y1="0%"
                x2="100%"
                y2="100%">

                <stop
                  offset="0%"
                  stop-color="#0f172a"/>

                <stop
                  offset="100%"
                  stop-color="#1e293b"/>

              </linearGradient>

              <linearGradient
                id="accent">

                <stop
                  offset="0%"
                  stop-color="#22d3ee"/>

                <stop
                  offset="100%"
                  stop-color="#6366f1"/>

              </linearGradient>

            </defs>

            <rect
              width="1000"
              height="520"
              rx="30"
              fill="url(#bg)"/>

            <rect
              width="1000"
              height="8"
              fill="url(#accent)"/>

            <text
              x="60"
              y="75"
              fill="white"
              font-size="36"
              font-family="Arial"
              font-weight="bold">

              Amzad Hussain

            </text>

            <text
              x="60"
              y="112"
              fill="#94a3b8"
              font-size="19"
              font-family="Arial">

              Full Stack Web Developer • MERN Stack Developer

            </text>

            <line
              x1="60"
              y1="145"
              x2="940"
              y2="145"
              stroke="#334155"
              stroke-width="2"/>

            <text
              x="100"
              y="210"
              fill="#22d3ee"
              font-size="40"
              font-family="Arial"
              font-weight="bold">

              {public_repos}

            </text>

            <text
              x="100"
              y="245"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial">

              Public Repositories

            </text>

            <text
              x="350"
              y="210"
              fill="#facc15"
              font-size="40"
              font-family="Arial"
              font-weight="bold">

              {total_stars}

            </text>

            <text
              x="350"
              y="245"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial">

              Total Stars

            </text>

            <text
              x="600"
              y="210"
              fill="#a78bfa"
              font-size="40"
              font-family="Arial"
              font-weight="bold">

              {followers}

            </text>

            <text
              x="600"
              y="245"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial">

              Followers

            </text>

            <text
              x="820"
              y="210"
              fill="#34d399"
              font-size="40"
              font-family="Arial"
              font-weight="bold">

              {total_forks}

            </text>

            <text
              x="820"
              y="245"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial">

              Total Forks

            </text>

            <rect
              x="60"
              y="290"
              width="880"
              height="80"
              rx="18"
              fill="#111827"/>

            <text
              x="90"
              y="340"
              fill="#f97316"
              font-size="32"
              font-family="Arial"
              font-weight="bold">

              {contributions}

            </text>

            <text
              x="270"
              y="340"
              fill="#cbd5e1"
              font-size="18"
              font-family="Arial">

              Contributions in the last year

            </text>

            <text
              x="60"
              y="425"
              fill="white"
              font-size="20"
              font-family="Arial"
              font-weight="bold">

              💻 Most Used Languages

            </text>

            <text
              x="60"
              y="465"
              fill="#22d3ee"
              font-size="18"
              font-family="Arial">

              {languages_text}

            </text>

            <text
              x="700"
              y="490"
              fill="#64748b"
              font-size="12"
              font-family="Arial">

              Updated: {current_time}

            </text>

          </svg>

          '''

          with open(

              "stats/github-stats.svg",

              "w",

              encoding="utf-8"

          ) as file:

              file.write(stats_svg)

          # --------------------------------
          # CONTRIBUTION GRAPH
          # --------------------------------

          weeks = calendar.get(
              "weeks",
              []
          )

          graph_width = 1000

          graph_height = 220

          cell_size = 12

          gap = 4

          graph = f'''

          <svg
            width="{graph_width}"
            height="{graph_height}"
            xmlns="http://www.w3.org/2000/svg">

            <rect
              width="100%"
              height="100%"
              rx="20"
              fill="#0f172a"/>

            <text
              x="30"
              y="35"
              fill="white"
              font-size="22"
              font-family="Arial"
              font-weight="bold">

              📈 Contribution Activity

            </text>

          '''

          for week_index, week in enumerate(weeks):

              for day_index, day in enumerate(
                  week.get(
                      "contributionDays",
                      []
                  )
              ):

                  count = day[
                      "contributionCount"
                  ]

                  x = 30 + (
                      week_index *
                      (cell_size + gap)
                  )

                  y = 60 + (
                      day_index *
                      (cell_size + gap)
                  )

                  if count == 0:

                      fill = "#1e293b"

                  elif count < 3:

                      fill = "#164e63"

                  elif count < 6:

                      fill = "#0891b2"

                  elif count < 10:

                      fill = "#06b6d4"

                  else:

                      fill = "#67e8f9"

                  graph += f'''

                  <rect
                    x="{x}"
                    y="{y}"
                    width="{cell_size}"
                    height="{cell_size}"
                    rx="3"
                    fill="{fill}"/>

                  '''

          graph += '''

          </svg>

          '''

          with open(

              "stats/contributions.svg",

              "w",

              encoding="utf-8"

          ) as file:

              file.write(graph)

          # --------------------------------
          # LANGUAGE CARD
          # --------------------------------

          language_svg = f'''

          <svg
            width="1000"
            height="240"
            xmlns="http://www.w3.org/2000/svg">

            <rect
              width="100%"
              height="100%"
              rx="20"
              fill="#0f172a"/>

            <text
              x="40"
              y="55"
              fill="white"
              font-size="25"
              font-family="Arial"
              font-weight="bold">

              💻 My Most Used Programming Languages

            </text>

            <text
              x="40"
              y="110"
              fill="#22d3ee"
              font-size="22"
              font-family="Arial">

              {languages_text}

            </text>

            <text
              x="40"
              y="165"
              fill="#94a3b8"
              font-size="17"
              font-family="Arial">

              Building modern applications with clean and efficient code.

            </text>

          </svg>

          '''

          with open(

              "stats/languages.svg",

              "w",

              encoding="utf-8"

          ) as file:

              file.write(language_svg)

          PY

      - name: Commit and Push Stats

        run: |

          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add stats/

          git diff --cached --quiet || git commit -m "Update GitHub stats"

          git push
