name: Generate My GitHub Stats

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import json
          import urllib.request
          import urllib.parse
          from datetime import datetime, timedelta

          USERNAME = "Amzad-Hussain-786"
          TOKEN = os.environ["GITHUB_TOKEN"]

          API_HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "github-stats-generator"
          }

          def api_get(url):
              request = urllib.request.Request(
                  url,
                  headers=API_HEADERS
              )

              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read())

          # ---------------------------------
          # USER INFORMATION
          # ---------------------------------

          user = api_get(
              f"https://api.github.com/users/{USERNAME}"
          )

          followers = user.get("followers", 0)
          public_repos = user.get("public_repos", 0)

          # ---------------------------------
          # ALL PUBLIC REPOSITORIES
          # ---------------------------------

          repositories = []

          for page in range(1, 10):
              url = (
                  f"https://api.github.com/users/{USERNAME}/repos"
                  f"?per_page=100&page={page}&type=owner"
              )

              data = api_get(url)

              if not data:
                  break

              repositories.extend(data)

              if len(data) < 100:
                  break

          # ---------------------------------
          # STARS AND FORKS
          # ---------------------------------

          total_stars = sum(
              repo.get("stargazers_count", 0)
              for repo in repositories
          )

          total_forks = sum(
              repo.get("forks_count", 0)
              for repo in repositories
          )

          # ---------------------------------
          # MOST USED LANGUAGES
          # ---------------------------------

          language_bytes = {}

          for repo in repositories:

              if repo.get("fork"):
                  continue

              languages_url = repo.get("languages_url")

              if not languages_url:
                  continue

              try:
                  languages = api_get(languages_url)

                  for language, bytes_count in languages.items():
                      language_bytes[language] = (
                          language_bytes.get(language, 0)
                          + bytes_count
                      )

              except Exception:
                  pass

          sorted_languages = sorted(
              language_bytes.items(),
              key=lambda item: item[1],
              reverse=True
          )

          top_languages = [
              language
              for language, value in sorted_languages[:5]
          ]

          if not top_languages:
              top_languages = ["JavaScript", "HTML", "CSS"]

          languages_text = " • ".join(top_languages)

          # ---------------------------------
          # CONTRIBUTIONS IN LAST 365 DAYS
          # ---------------------------------

          end_date = datetime.utcnow()
          start_date = end_date - timedelta(days=365)

          contributions = 0

          try:
              query = """
              query($user: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $user) {
                  contributionsCollection(
                    from: $from
                    to: $to
                  ) {
                    contributionCalendar {
                      totalContributions
                    }
                  }
                }
              }
              """

              graphql_payload = json.dumps({
                  "query": query,
                  "variables": {
                      "user": USERNAME,
                      "from": start_date.isoformat() + "Z",
                      "to": end_date.isoformat() + "Z"
                  }
              }).encode("utf-8")

              request = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=graphql_payload,
                  headers={
                      **API_HEADERS,
                      "Content-Type": "application/json"
                  },
                  method="POST"
              )

              with urllib.request.urlopen(request) as response:
                  graphql_data = json.loads(response.read())

              contributions = (
                  graphql_data
                  .get("data", {})
                  .get("user", {})
                  .get("contributionsCollection", {})
                  .get("contributionCalendar", {})
                  .get("totalContributions", 0)
              )

          except Exception:
              contributions = 0

          # ---------------------------------
          # CURRENT STREAK
          # ---------------------------------

          current_streak = "N/A"

          # ---------------------------------
          # CREATE SVG
          # ---------------------------------

          now = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          svg = f'''<svg
            width="1000"
            height="480"
            viewBox="0 0 1000 480"
            xmlns="http://www.w3.org/2000/svg">

            <defs>

              <linearGradient
                id="background"
                x1="0%"
                y1="0%"
                x2="100%"
                y2="100%">

                <stop
                  offset="0%"
                  stop-color="#0f172a"/>

                <stop
                  offset="100%"
                  stop-color="#1e293b"/>

              </linearGradient>

              <linearGradient
                id="accent"
                x1="0%"
                y1="0%"
                x2="100%"
                y2="0%">

                <stop
                  offset="0%"
                  stop-color="#38bdf8"/>

                <stop
                  offset="100%"
                  stop-color="#818cf8"/>

              </linearGradient>

              <filter
                id="shadow">

                <feDropShadow
                  dx="0"
                  dy="8"
                  stdDeviation="12"
                  flood-opacity="0.35"/>

              </filter>

            </defs>

            <!-- Main Card -->

            <rect
              x="10"
              y="10"
              width="980"
              height="460"
              rx="28"
              fill="url(#background)"
              filter="url(#shadow)"/>

            <!-- Top Accent -->

            <rect
              x="10"
              y="10"
              width="980"
              height="8"
              rx="4"
              fill="url(#accent)"/>

            <!-- Header -->

            <text
              x="60"
              y="75"
              fill="#ffffff"
              font-size="36"
              font-family="Arial, sans-serif"
              font-weight="bold">

              Amzad Hussain

            </text>

            <text
              x="60"
              y="112"
              fill="#94a3b8"
              font-size="19"
              font-family="Arial, sans-serif">

              Full Stack Web Developer • MERN Stack Developer

            </text>

            <!-- Divider -->

            <line
              x1="60"
              y1="145"
              x2="940"
              y2="145"
              stroke="#334155"
              stroke-width="2"/>

            <!-- Stat 1 -->

            <text
              x="100"
              y="205"
              fill="#38bdf8"
              font-size="38"
              font-family="Arial, sans-serif"
              font-weight="bold">

              {public_repos}

            </text>

            <text
              x="100"
              y="238"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial, sans-serif">

              Public Repositories

            </text>

            <!-- Stat 2 -->

            <text
              x="350"
              y="205"
              fill="#facc15"
              font-size="38"
              font-family="Arial, sans-serif"
              font-weight="bold">

              {total_stars}

            </text>

            <text
              x="350"
              y="238"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial, sans-serif">

              Total Stars

            </text>

            <!-- Stat 3 -->

            <text
              x="600"
              y="205"
              fill="#a78bfa"
              font-size="38"
              font-family="Arial, sans-serif"
              font-weight="bold">

              {followers}

            </text>

            <text
              x="600"
              y="238"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial, sans-serif">

              Followers

            </text>

            <!-- Stat 4 -->

            <text
              x="820"
              y="205"
              fill="#34d399"
              font-size="38"
              font-family="Arial, sans-serif"
              font-weight="bold">

              {total_forks}

            </text>

            <text
              x="820"
              y="238"
              fill="#cbd5e1"
              font-size="16"
              font-family="Arial, sans-serif">

              Total Forks

            </text>

            <!-- Contributions -->

            <rect
              x="60"
              y="275"
              width="880"
              height="75"
              rx="16"
              fill="#111827"/>

            <text
              x="90"
              y="320"
              fill="#f97316"
              font-size="28"
              font-family="Arial, sans-serif"
              font-weight="bold">

              {contributions}

            </text>

            <text
              x="230"
              y="320"
              fill="#cbd5e1"
              font-size="18"
              font-family="Arial, sans-serif">

              Contributions in the last year

            </text>

            <!-- Languages -->

            <text
              x="60"
              y="395"
              fill="#ffffff"
              font-size="19"
              font-family="Arial, sans-serif"
              font-weight="bold">

              💻 Most Used Languages

            </text>

            <text
              x="60"
              y="430"
              fill="#38bdf8"
              font-size="17"
              font-family="Arial, sans-serif">

              {languages_text}

            </text>

            <!-- Updated -->

            <text
              x="700"
              y="445"
              fill="#64748b"
              font-size="12"
              font-family="Arial, sans-serif">

              Updated: {now}

            </text>

          </svg>'''

          os.makedirs("stats", exist_ok=True)

          with open(
              "stats/github-stats.svg",
              "w",
              encoding="utf-8"
          ) as file:

              file.write(svg)

          PY

      - name: Commit generated stats
        run: |

          git config user.name "github-actions[bot]"

          git config user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"

          git add stats/github-stats.svg

          git diff --cached --quiet || \
          git commit -m "Update GitHub stats"

          git push
