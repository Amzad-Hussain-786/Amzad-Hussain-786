<svg
  width="1000"
  height="480"
  viewBox="0 0 1000 480"
  xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient
      id="background"
      x1="0%"
      y1="0%"
      x2="100%"
      y2="100%">

      <stop
        offset="0%"
        stop-color="#0f172a"/>

      <stop
        offset="100%"
        stop-color="#1e293b"/>

    </linearGradient>

    <linearGradient
      id="accent"
      x1="0%"
      y1="0%"
      x2="100%"
      y2="0%">

      <stop
        offset="0%"
        stop-color="#38bdf8"/>

      <stop
        offset="100%"
        stop-color="#818cf8"/>

    </linearGradient>

    <filter
      id="shadow">

      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="12"
        flood-opacity="0.35"/>

    </filter>

  </defs>

  <!-- Main Card -->

  <rect
    x="10"
    y="10"
    width="980"
    height="460"
    rx="28"
    fill="url(#background)"
    filter="url(#shadow)"/>

  <!-- Top Accent -->

  <rect
    x="10"
    y="10"
    width="980"
    height="8"
    rx="4"
    fill="url(#accent)"/>

  <!-- Header -->

  <text
    x="60"
    y="75"
    fill="#ffffff"
    font-size="36"
    font-family="Arial, sans-serif"
    font-weight="bold">

    Amzad Hussain

  </text>

  <text
    x="60"
    y="112"
    fill="#94a3b8"
    font-size="19"
    font-family="Arial, sans-serif">

    Full Stack Web Developer • MERN Stack Developer

  </text>

  <!-- Divider -->

  <line
    x1="60"
    y1="145"
    x2="940"
    y2="145"
    stroke="#334155"
    stroke-width="2"/>

  <!-- Stat 1 -->

  <text
    x="100"
    y="205"
    fill="#38bdf8"
    font-size="38"
    font-family="Arial, sans-serif"
    font-weight="bold">

    81

  </text>

  <text
    x="100"
    y="238"
    fill="#cbd5e1"
    font-size="16"
    font-family="Arial, sans-serif">

    Public Repositories

  </text>

  <!-- Stat 2 -->

  <text
    x="350"
    y="205"
    fill="#facc15"
    font-size="38"
    font-family="Arial, sans-serif"
    font-weight="bold">

    2

  </text>

  <text
    x="350"
    y="238"
    fill="#cbd5e1"
    font-size="16"
    font-family="Arial, sans-serif">

    Total Stars

  </text>

  <!-- Stat 3 -->

  <text
    x="600"
    y="205"
    fill="#a78bfa"
    font-size="38"
    font-family="Arial, sans-serif"
    font-weight="bold">

    2

  </text>

  <text
    x="600"
    y="238"
    fill="#cbd5e1"
    font-size="16"
    font-family="Arial, sans-serif">

    Followers

  </text>

  <!-- Stat 4 -->

  <text
    x="820"
    y="205"
    fill="#34d399"
    font-size="38"
    font-family="Arial, sans-serif"
    font-weight="bold">

    0

  </text>

  <text
    x="820"
    y="238"
    fill="#cbd5e1"
    font-size="16"
    font-family="Arial, sans-serif">

    Total Forks

  </text>

  <!-- Contributions -->

  <rect
    x="60"
    y="275"
    width="880"
    height="75"
    rx="16"
    fill="#111827"/>

  <text
    x="90"
    y="320"
    fill="#f97316"
    font-size="28"
    font-family="Arial, sans-serif"
    font-weight="bold">

    24

  </text>

  <text
    x="230"
    y="320"
    fill="#cbd5e1"
    font-size="18"
    font-family="Arial, sans-serif">

    Contributions in the last year

  </text>

  <!-- Languages -->

  <text
    x="60"
    y="395"
    fill="#ffffff"
    font-size="19"
    font-family="Arial, sans-serif"
    font-weight="bold">

    💻 Most Used Languages

  </text>

  <text
    x="60"
    y="430"
    fill="#38bdf8"
    font-size="17"
    font-family="Arial, sans-serif">

    JavaScript • HTML • CSS • TypeScript

  </text>

  <!-- Updated -->

  <text
    x="700"
    y="445"
    fill="#64748b"
    font-size="12"
    font-family="Arial, sans-serif">

    Updated: 2026-07-20 11:27 UTC

  </text>

</svg>